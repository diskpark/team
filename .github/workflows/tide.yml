name: Update Tide Data

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  update-tide:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch tide data
        run: |
          python3 << 'PYEOF'
          import urllib.request, json
          from datetime import datetime, timedelta, timezone

          KEY = 'fb0e643141b9e4930ad8df0ebb1324c952b6d4ce8e89dbea8f1957d0afb3a18a'
          KR_DAY = ['일','월','화','수','목','금','토']
          KST = timezone(timedelta(hours=9))
          days = []
          today = datetime.now(KST)

          for i in range(7):
            d = today + timedelta(days=i)
            date_str = d.strftime('%Y%m%d')
            code = 'DT_0007'
            url = f'https://apis.data.go.kr/1192136/tideFcstHghLw/GetTideFcstHghLwApiService?serviceKey={KEY}&pageNo=1&numOfRows=10&type=json&obsCode={code}&reqDate={date_str}'
            try:
              with urllib.request.urlopen(url, timeout=10) as r:
                data = json.loads(r.read())
              tides = []
              if data.get('body') and data['body'].get('items') and data['body']['items'].get('item'):
                for t in data['body']['items']['item']:
                  se = t.get('extrSe','')
                  time = t.get('predcDt','')[11:16]
                  level = int(t.get('predcTdlvVl',0))
                  if se in ['1','3']:
                    tides.append({'type':'고조','time':time,'level':level})
                  elif se in ['2','4']:
                    tides.append({'type':'저조','time':time,'level':level})
              days.append({'date':str(d.month)+'/'+str(d.day)+'('+KR_DAY[d.weekday()]+')','ymd':date_str,'tides':tides})
              print(f'{date_str}: {len(tides)}개')
            except Exception as e:
              print(f'{date_str} 오류: {e}')
              days.append({'date':str(d.month)+'/'+str(d.day)+'('+KR_DAY[d.weekday()]+')','ymd':date_str,'tides':[]})

          with open('tide.json','w',encoding='utf-8') as f:
            json.dump({'updated':today.strftime('%Y-%m-%d'),'days':days},f,ensure_ascii=False,indent=2)
          print('완료')
          PYEOF

      - name: Commit tide.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add tide.json
          git diff --staged --quiet || git commit -m "Update tide data $(date '+%Y-%m-%d')"
          git push
