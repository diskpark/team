<html lang="ko">
<head>

<title>지게차 주간 근무표</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d1a;color:#e0e0f0;font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
.header{background:linear-gradient(135deg,#0d0d1a 0%,#1a1a3e 100%);border-bottom:1px solid #ffffff11;padding:20px 16px 16px}
.header-title{text-align:center;margin-bottom:14px}
.header-sub{color:#4a9eff88;font-size:11px;letter-spacing:3px;font-weight:700;margin-bottom:2px}
.header-date{font-size:13px;color:#888}
.day-row{display:flex;gap:4px}
.day-col{flex:1;display:flex;flex-direction:column;gap:4px}
.day-label{font-size:12px;font-weight:700;text-align:center}
.day-date{font-size:9px;color:#444;text-align:center}
.btn{border-radius:8px;padding:5px 2px;text-align:center;font-size:10px;font-weight:700;cursor:pointer;border:1px solid #333;background:#1a1a2e;color:#444;user-select:none}
.btn.on-yes{background:#4a9eff;color:#fff;border-color:#4a9eff}
.btn.on-no{background:#ff6b6b;color:#fff;border-color:#ff6b6b}
.btn.has-excl{background:#ff9f7f22;color:#ff9f7f;border-color:#ff9f7f66;min-height:28px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px}
.btn.no-excl{min-height:28px;display:flex;align-items:center;justify-content:center}
.vac-btn-wrap{margin-top:10px;display:flex;gap:8px;justify-content:center}
.vac-btn{display:inline-block;padding:6px 16px;border-radius:20px;background:#ffd93d22;border:1px solid #ffd93d44;color:#ffd93d;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:1px}
.content{padding:16px 16px 60px;max-width:540px;margin:0 auto}
.card{background:#13132a;border-radius:14px;padding:14px;margin-bottom:14px}

.wbtn.sel{background:#4a9eff22;border-color:#4a9eff;color:#fff;font-weight:700}

.pbg{position:fixed;top:0;left:0;right:0;bottom:0;background:#000000cc;z-index:200;display:flex;align-items:flex-end;justify-content:center}
.pinner{background:#13132a;border-radius:20px 20px 0 0;padding:20px 16px 40px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
.phead{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.pday{font-size:16px;font-weight:900;color:#fff}
.pdate{font-size:12px;color:#555;margin-left:8px}
.pclose{color:#555;font-size:20px;cursor:pointer;padding:0 4px}
.phint{font-size:11px;color:#666;font-weight:700;letter-spacing:2px;margin-bottom:12px}

.en.autovac{color:#ffd93d}
.et{font-size:10px;font-weight:700;margin-top:3px}
.et.absent{color:#ff6b6b}
.et.vacation{color:#ffd93d}
.et.seaworld{color:#88eeff}
.settings-btn{position:fixed;top:12px;right:12px;z-index:150;width:36px;height:36px;border-radius:50%;background:#1a1a2e;border:1px solid #ffffff22;color:#aaa;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none}
.settings-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:#000000cc;z-index:200;display:flex;align-items:flex-end;justify-content:center}
.settings-inner{background:#13132a;border-radius:20px 20px 0 0;padding:20px 16px 40px;width:100%;max-width:480px;max-height:70vh;overflow-y:auto}
.settings-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.settings-title{font-size:16px;font-weight:900;color:#fff}
.settings-close{color:#555;font-size:20px;cursor:pointer;padding:0 4px}
.settings-section{margin-bottom:20px}
.settings-label{font-size:11px;color:#666;font-weight:700;letter-spacing:2px;margin-bottom:10px}
.settings-options{display:flex;gap:8px;flex-wrap:wrap}
.settings-opt{border:1.5px solid #333;border-radius:10px;padding:8px 14px;font-size:12px;color:#aaa;cursor:pointer;background:#1a1a2e;user-select:none;transition:all 0.15s}
.settings-opt.active{border-color:#4a9eff;color:#fff;background:#4a9eff22;font-weight:700}
.sun-btn{width:26px;height:26px;border-radius:6px;background:#1a1a2e;border:1px solid #333;color:#aaa;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none}
.sun-cnt{font-size:13px;font-weight:700;min-width:20px;text-align:center}
</style>
</head>
<body>
<div id="app"></div>
<script>
var WORKERS=["이원훈","장형규","조현철","박진호","홍인석","하정남","황정호","김현진","전창범","오규종","김경훈","정철수","황인태","안찬범","김상원","이동현","김태민","김성환","김세영","홍원진","이재일","이준영","김태호","김택성","채관기","김재원","장병숙","윤광덕","박성기"];
var N=WORKERS.length;
var KR=["일","월","화","수","목","금","토"];
var VACATION_SCHEDULE=[
  {name:"김상원",start:"2026-04-13",end:"2026-04-16"},
  {name:"황정호",start:"2026-04-20",end:"2026-04-23"},
  {name:"하정남",start:"2026-04-27",end:"2026-04-30"},
  {name:"이동현",start:"2026-05-04",end:"2026-05-07"},
  {name:"장형규",start:"2026-05-18",end:"2026-05-21"},
  {name:"조현철",start:"2026-05-26",end:"2026-05-29"},
  {name:"홍인석",start:"2026-06-01",end:"2026-06-04"},
  {name:"홍원진",start:"2026-06-15",end:"2026-06-18"},
  {name:"김재원",start:"2026-06-22",end:"2026-06-25"},
  {name:"황인태",start:"2026-06-29",end:"2026-07-02"},
  {name:"김성환",start:"2026-07-06",end:"2026-07-09"},
  {name:"오규종",start:"2026-07-13",end:"2026-07-16"},
  {name:"이재일",start:"2026-07-20",end:"2026-07-23"},
  {name:"김택성",start:"2026-07-27",end:"2026-07-30"},
  {name:"김세영",start:"2026-08-03",end:"2026-08-06"},
  {name:"정철수",start:"2026-08-10",end:"2026-08-13"},
  {name:"전창범",start:"2026-08-18",end:"2026-08-21"},
  {name:"김태민",start:"2026-08-25",end:"2026-08-28"},
  {name:"이준영",start:"2026-08-31",end:"2026-09-03"},
  {name:"채관기",start:"2026-09-08",end:"2026-09-11"},
  {name:"장병숙",start:"2026-09-30",end:"2026-10-03"},
  {name:"김경훈",start:"2026-10-05",end:"2026-10-08"},
  {name:"윤광덕",start:"2026-10-28",end:"2026-10-31"},
  {name:"안찬범",start:"2026-11-23",end:"2026-11-26"},
  {name:"이원훈",start:"2026-12-07",end:"2026-12-10"},
  {name:"김현진",start:"2026-12-21",end:"2026-12-24"},
  {name:"박진호",start:"2026-12-28",end:"2026-12-31"},
  {name:"박성기",start:"2027-01-25",end:"2027-01-28"}
];
var SEAWORLD_SCHEDULE=[
  {name:"정태경",start:"2026-04-06",end:"2026-04-09"},
  {name:"박혁신",start:"2026-05-11",end:"2026-05-14"},
  {name:"김재일",start:"2026-06-16",end:"2026-06-19"},
  {name:"문환석",start:"2026-10-14",end:"2026-10-17"}
];

function getWeekDates(){var t=new Date(),r=[];for(var i=0;i<7;i++){var d=new Date(t);d.setDate(t.getDate()+i);r.push(pad(d.getMonth()+1)+"."+pad(d.getDate()));}return r;}
function getWeekDays(){var t=new Date(),r=[];for(var i=0;i<7;i++){var d=new Date(t);d.setDate(t.getDate()+i);r.push(KR[d.getDay()]);}return r;}
function getWeekDateObjs(){var t=new Date(),r=[];for(var i=0;i<7;i++){var d=new Date(t);d.setDate(t.getDate()+i);d.setHours(0,0,0,0);r.push(d);}return r;}
function pad(n){return n<10?"0"+n:""+n;}
function fmtToday(){var t=new Date();return t.getFullYear()+"."+pad(t.getMonth()+1)+"."+pad(t.getDate());}
function fmtVacDate(s){var d=new Date(s+"T00:00:00");return(d.getMonth()+1)+"/"+d.getDate()+"("+KR[d.getDay()]+")";}
function toNum(name){return WORKERS.indexOf(name)+1;}

function getAutoVac(dateObjs){
  var r=[];for(var i=0;i<7;i++){r.push({});}
  dateObjs.forEach(function(cur,idx){
    VACATION_SCHEDULE.forEach(function(v){var s=new Date(v.start+"T00:00:00"),e=new Date(v.end+"T00:00:00");if(cur>=s&&cur<=e)r[idx][v.name]="휴가";});
    SEAWORLD_SCHEDULE.forEach(function(v){var s=new Date(v.start+"T00:00:00"),e=new Date(v.end+"T00:00:00");if(cur>=s&&cur<=e)r[idx][v.name]="씨월드";});
  });
  return r;
}

function pickFwd(count,startIdx,excl){var team=[],cur=((startIdx%N)+N)%N;while(team.length<count){var name=WORKERS[cur];cur=(cur+1)%N;if(excl.indexOf(name)<0)team.push(name);}return{team:team,next:cur};}
function pickRev(count,fromIdx,excl){var team=[],cur=((fromIdx%N)+N)%N;while(team.length<count){var name=WORKERS[cur];if(excl.indexOf(name)<0)team.push(name);cur=((cur-1)+N)%N;}return{team:team.reverse(),next:cur};}
function insertOrder(arr,name){var idx=WORKERS.indexOf(name),ip=arr.length;for(var i=0;i<arr.length;i++){if(WORKERS.indexOf(arr[i])>idx){ip=i;break;}}arr.splice(ip,0,name);}

function calcSchedule(carDays,dayExcl,firstWorker,sundayCount,weekDays){
  var fi=WORKERS.indexOf(firstWorker);
  var initBib=pickRev(6,(fi-1+N)%N,[]).team;
  var cursor=fi,prevDae=initBib,prevSun=[],prevYac=[],prevActBib=initBib;
  var result=[];
  for(var d=0;d<carDays.length;d++){
    var hasCar=carDays[d],prevCar=d>0?carDays[d-1]:null;
    var exclMap=dayExcl[d]||{},excl=Object.keys(exclMap);
    var avail=WORKERS.filter(function(w){return excl.indexOf(w)<0;});
    var bib=pickRev(6,WORKERS.indexOf(prevDae[prevDae.length-1]),excl).team;
    var prevExclMap=d>0?(dayExcl[d-1]||{}):{};
    var absRet=Object.keys(prevExclMap).filter(function(w){return prevExclMap[w]==="결근"&&excl.indexOf(w)<0;});
    var vacRet=Object.keys(prevExclMap).filter(function(w){return prevExclMap[w]==="휴가"&&excl.indexOf(w)<0;});
    if(hasCar){
      var dae,sun,yac,jay;
      if(d===0||!prevCar){
        var r1=pickFwd(6,cursor,excl);dae=r1.team;
        var r2=pickFwd(4,r1.next,excl);sun=r2.team;
        var r3=pickFwd(6,r2.next,excl);yac=r3.team;
        var r4=pickFwd(4,r3.next,excl);jay=r4.team;
        cursor=r4.next;
      } else {
        dae=prevSun.concat(prevYac.slice(0,2)).filter(function(w){return excl.indexOf(w)<0;});
        sun=prevYac.slice(2,6).filter(function(w){return excl.indexOf(w)<0;});
        var pj=result[d-1].jay.filter(function(w){return excl.indexOf(w)<0;});
        var r1=pickFwd(6-pj.length,cursor,excl);yac=pj.concat(r1.team);cursor=r1.next;
        var r2=pickFwd(4,cursor,excl);jay=r2.team;cursor=r2.next;
      }
      var jadExtra=[];
      absRet.forEach(function(ret){
        if(dae.indexOf(ret)>=0)dae=dae.filter(function(w){return w!==ret;});
        jadExtra.push(ret);
        var lastBibIdx=WORKERS.indexOf(bib[bib.length-1]);
        var nextIdx=(lastBibIdx+1)%N;
        while(excl.indexOf(WORKERS[nextIdx])>=0||bib.indexOf(WORKERS[nextIdx])>=0||jadExtra.indexOf(WORKERS[nextIdx])>=0){nextIdx=(nextIdx+1)%N;}
        bib.push(WORKERS[nextIdx]);
      });
      vacRet.forEach(function(ret){
        insertOrder(yac,ret);
        if(yac.length>6){var pushed=yac.splice(6,1)[0];insertOrder(jay,pushed);if(jay.length>4)jay.splice(4,1);}
      });
      var assigned=dae.concat(sun,yac,jay,bib);
      var jad=avail.filter(function(w){return assigned.indexOf(w)<0;});
      jadExtra.forEach(function(ret){if(jad.indexOf(ret)<0)jad.push(ret);});
      result.push({hasCar:true,dae:dae,sun:sun,yac:yac,jay:jay,jad:jad,bib:bib,rest:[],excl:exclMap});
      prevDae=dae;prevSun=sun;prevYac=yac;prevActBib=bib;
    } else {
      if(sundayCount>0&&weekDays&&weekDays[d]==="일"){
        var li;
        if(prevCar===false){li=(WORKERS.indexOf(prevDae[0])-1+N)%N;}
        else{li=WORKERS.indexOf(prevActBib[prevActBib.length-1]);}
        var sw=pickRev(sundayCount,li,excl).team;
        var rest=avail.filter(function(w){return sw.indexOf(w)<0&&bib.indexOf(w)<0;});
        result.push({hasCar:false,dae:[],sun:[],yac:[],jay:[],jad:[],sunw:sw,bib:bib,rest:rest,excl:exclMap,isSun:true});
        var bibForNext=sw.slice();
        if(bibForNext.length>6){cursor=WORKERS.indexOf(bibForNext[bibForNext.length-1]);bibForNext=bibForNext.slice(0,6);}
        else if(bibForNext.length<6){var lastIdx=WORKERS.indexOf(bibForNext[bibForNext.length-1]),need=6-bibForNext.length,cur2=(lastIdx+1)%N;for(var ni=0;ni<need;ni++){while(excl.indexOf(WORKERS[cur2])>=0)cur2=(cur2+1)%N;bibForNext.push(WORKERS[cur2]);cur2=(cur2+1)%N;}cursor=cur2;}
        else{cursor=(WORKERS.indexOf(bibForNext[bibForNext.length-1])+1)%N;}
        prevDae=bibForNext;
        var restAll=WORKERS.filter(function(w){return sw.indexOf(w)<0&&excl.indexOf(w)<0;});
        prevActBib=restAll;prevSun=[];prevYac=[];
      } else {
        var li;
        if(prevCar===false){li=(WORKERS.indexOf(prevDae[0])-1+N)%N;}
        else{li=WORKERS.indexOf(prevActBib[prevActBib.length-1]);}
        var rJ=pickRev(4,li,excl),rS=pickRev(4,rJ.next,excl),rD=pickRev(6,rS.next,excl);
        var jay=rJ.team,sun=rS.team,dae=rD.team;
        absRet.forEach(function(ret){
          insertOrder(jay,ret);
          if(jay.length>4){var pushed=jay.shift();insertOrder(sun,pushed);if(sun.length>4){var pushed2=sun.shift();insertOrder(dae,pushed2);if(dae.length>6){var pushed3=dae.shift();bib.push(pushed3);}}}
        });
        var assigned=dae.concat(sun,jay,bib);
        var rest=avail.filter(function(w){return assigned.indexOf(w)<0;});
        result.push({hasCar:false,dae:dae,sun:sun,yac:[],jay:jay,jad:[],bib:bib,rest:rest,excl:exclMap});
        prevDae=dae;prevSun=sun;prevYac=[];prevActBib=bib;
        if(d<carDays.length-1&&carDays[d+1])cursor=(WORKERS.indexOf(dae[dae.length-1])+1)%N;
      }
    }
  }
  return result;
}

var state={
  carDays:(function(){
    try{var s=JSON.parse(localStorage.getItem('carPlan')||'null');if(s&&s.date===new Date().toDateString()&&Array.isArray(s.days))return s.days;}catch(e){}
    var days=[null,null,null,null,null,null,null];var wk=getWeekDays();for(var i=0;i<wk.length;i++){if(wk[i]==="일")days[i]=false;}return days;
  })(),
  firstWorker:(function(){try{var s=JSON.parse(localStorage.getItem('firstWorker')||'null');if(s&&s.date===new Date().toDateString())return s.name||'';}catch(e){}return '';})(),
  myName:localStorage.getItem('myName')||'',
  dayExcludes:(function(){try{var s=JSON.parse(localStorage.getItem('dayExcludes')||'null');if(s&&s.date===new Date().toDateString()&&Array.isArray(s.data))return s.data;}catch(e){}return [{},{},{},{},{},{},{}];})(),
  sundayCount:parseInt(localStorage.getItem('sundayCount')||'4',10),
  history:(function(){try{return JSON.parse(localStorage.getItem('dayHistory')||'[]');}catch(e){return[];}})(),
  settings:{font:"system",size:4,skin:"dark"},
  popupDay:null,vacPopup:false,settingsOpen:false,
  myNameOpen:localStorage.getItem('myNameOpen')!=='false',
  d1Open:localStorage.getItem('d1Open')!=='false',
  weekDates:getWeekDates(),weekDays:getWeekDays(),weekDateObjs:getWeekDateObjs()
};

function setState(patch){for(var k in patch)state[k]=patch[k];render();}

function h(tag,attrs,children){
  var el=document.createElement(tag);
  if(attrs)for(var k in attrs){if(k==="className")el.className=attrs[k];else if(k.startsWith("on"))el[k.toLowerCase()]=attrs[k];else el.setAttribute(k,attrs[k]);}
  if(children){if(typeof children==="string")el.innerHTML=children;else if(Array.isArray(children))children.forEach(function(c){if(c)el.appendChild(typeof c==="string"?document.createTextNode(c):c);});else el.appendChild(children);}
  return el;
}

function applySettings(s){
  var sizes=[10,11,12,13,14,15,16];
  var size=(sizes[s.size]||13)+"px";
  var styleEl=document.getElementById("dyn-style");
  if(!styleEl){styleEl=document.createElement("style");styleEl.id="dyn-style";document.head.appendChild(styleEl);}
  styleEl.textContent="body{font-size:"+size+"!important}";
}

function render(){
  applySettings(state.settings);
  var wd=state.weekDates,wk=state.weekDays,cd=state.carDays;
  var dayExcl=state.dayExcludes;
  if(!Array.isArray(dayExcl)||dayExcl.length!==7){dayExcl=[{},{},{},{},{},{},{}];state.dayExcludes=dayExcl;}

function formatNames(label,names){
  if(!names||names.length===0)return "";
  var labels={"대양":"대양","성우":"성우","오선":"오선","씨월드":"씨월드","C":"  C","휴가":"휴가","결근":"결근","차":"  차","일요근무":"일요근무"};
  var lb=(labels[label]||label)+", ";
  var pad="";for(var p=0;p<lb.length;p++)pad+=" ";
  var line="";
  for(var i=0;i<names.length;i+=4){var chunk=names.slice(i,i+4);if(i===0)line+=lb+chunk.join(", ")+"\n";else line+=pad+chunk.join(", ")+"\n";}
  return line;
}

function makeTomorrowText(sched,wk,wd,merged){
  var tomorrow=sched[1];
  var tIdx=1;
  var dateStr=wd[tIdx].replace(".","/").replace(/^0/,"")+" "+wk[tIdx];
  var line=dateStr+"\n";
  var tomorrowMerged=merged[1]||{};
  var vacNames=Object.keys(tomorrowMerged).filter(function(k){return tomorrowMerged[k]==="휴가";});
  var absNames=Object.keys(tomorrowMerged).filter(function(k){return tomorrowMerged[k]==="결근";});
  var seaworldFixed=["정태경"];
  if(tomorrow.hasCar){
    line+=formatNames("대양",tomorrow.dae);
    line+=formatNames("성우",tomorrow.sun);
    line+=formatNames("차",tomorrow.yac);
    line+=formatNames("오선",tomorrow.jay);
    line+=formatNames("차",tomorrow.jad);
  } else if(tomorrow.isSun){
    line+=formatNames("일요근무",tomorrow.sunw);
  } else {
    line+=formatNames("대양",tomorrow.dae);
    line+=formatNames("성우",tomorrow.sun);
    line+=formatNames("오선",tomorrow.jay);
  }
  line+=formatNames("C",seaworldFixed);
  line+=formatNames("휴가",vacNames);
  line+=formatNames("결근",absNames);
  return line.trim();
}

function makeTodayText(sched,wk,wd,merged){
  var today=sched[0];
  var todayMerged=merged[0]||{};
  var vacNames=Object.keys(todayMerged).filter(function(k){return todayMerged[k]==="휴가";});
  var absNames=Object.keys(todayMerged).filter(function(k){return todayMerged[k]==="결근";});
  var swNames=Object.keys(todayMerged).filter(function(k){return todayMerged[k]==="씨월드";});
  var line=wd[0].replace(".","/").replace(/^0/,"")+" "+wk[0]+" (오늘)\n";
  if(today.hasCar){
    line+=formatNames("대양",today.dae);
    line+=formatNames("성우",today.sun);
    line+=formatNames("차",today.yac);
    line+=formatNames("오선",today.jay);
    line+=formatNames("차",today.jad);
  } else {
    line+=formatNames("대양",today.dae);
    line+=formatNames("성우",today.sun);
    line+=formatNames("오선",today.jay);
  }
  if(swNames.length>0)line+=formatNames("씨월드",swNames);
  if(vacNames.length>0)line+=formatNames("휴가",vacNames);
  if(absNames.length>0)line+=formatNames("결근",absNames);
  return line.trim();
}

  phead.appendChild(pclose);pinner.appendChild(phead);
  pinner.appendChild(h("div",{style:"font-size:10px;color:#666;font-weight:700;letter-spacing:2px;margin-bottom:6px"},"▪ 오늘 근무"));
  pinner.appendChild(h("div",{style:"background:#0d0d1a;border-radius:10px;padding:12px;font-size:12px;line-height:1.9;color:#888;white-space:pre-wrap;margin-bottom:14px"},todayText));
  pinner.appendChild(h("div",{style:"font-size:10px;color:#4a9eff88;font-weight:700;letter-spacing:2px;margin-bottom:6px"},"▪ 내일 근무 (카톡 발송용)"));
  pinner.appendChild(h("div",{style:"background:#0d0d1a;border-radius:10px;padding:14px;font-size:13px;line-height:2;color:#e0e0f0;white-space:pre-wrap;margin-bottom:16px"},text));
  var cbtn=h("div",{style:"background:#4a9eff;color:#fff;font-size:14px;font-weight:700;border-radius:12px;padding:12px;text-align:center;cursor:pointer"},"📋 복사하기");
  cbtn.onclick=function(){
    if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){cbtn.textContent="✅ 복사됨!";setTimeout(function(){document.body.removeChild(pbg);},1000);});}
    else{var ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);cbtn.textContent="✅ 복사됨!";setTimeout(function(){document.body.removeChild(pbg);},1000);}
  };
  pinner.appendChild(cbtn);pbg.appendChild(pinner);document.body.appendChild(pbg);
}

function copyTomorrow(sched,wk,wd,merged,btn){
  var text=makeTomorrowText(sched,wk,wd,merged);
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){btn.textContent="✅ 복사됨!";setTimeout(function(){btn.textContent="📋 내일 복사";},2000);});}
  else{var ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);btn.textContent="✅ 복사됨!";setTimeout(function(){btn.textContent="📋 내일 복사";},2000);}
}

function renderPopup(idx,wk,wd,merged,dayExcl){
  var bg=h("div",{className:"pbg"});
  bg.onclick=function(){setState({popupDay:null});};
  var inner=h("div",{className:"pinner"});
  inner.onclick=function(e){e.stopPropagation();};
  var phead=h("div",{className:"phead"});
  var ptitle=document.createElement("div");
  ptitle.innerHTML="<span class='pday'>"+wk[idx]+"요일</span><span class='pdate'>"+wd[idx]+"</span>";
  var pclose=h("div",{className:"pclose"},"✕");
  pclose.onclick=function(){setState({popupDay:null});};
  phead.appendChild(ptitle);phead.appendChild(pclose);
  inner.appendChild(phead);
  inner.appendChild(h("div",{className:"phint"},"▪ 제외 인원 (탭: 없음→결근→휴가→씨월드→없음)"));
  var grid=h("div",{className:"grid4"});
  WORKERS.forEach(function(name){
    var manual=(dayExcl[idx]||{})[name];
    var isAuto=!manual&&!!(merged[idx]||{})[name];
    var btnCls="eb"+(manual==="결근"?" absent":manual==="휴가"?" vacation":manual==="씨월드"?" seaworld":isAuto?" autovac":"");
    var nameCls="en"+(manual==="결근"?" absent":manual==="휴가"?" vacation":manual==="씨월드"?" seaworld":isAuto?" autovac":"");
    var showType=manual||(isAuto?(merged[idx]||{})[name]+"(자동)":"");
    var btn2=h("div",{className:btnCls});
    btn2.appendChild(h("div",{className:nameCls},name));
    if(showType){btn2.appendChild(h("div",{className:"et "+(manual==="결근"?"absent":manual==="씨월드"?"seaworld":"vacation")},showType));}
    (function(n){btn2.onclick=function(){toggleExcl(idx,n);};})(name);
    grid.appendChild(btn2);
  });
  inner.appendChild(grid);bg.appendChild(inner);return bg;
}

function renderVacPopup(){
  var today=new Date();today.setHours(0,0,0,0);
  var bg=h("div",{className:"pbg"});
  bg.onclick=function(){setState({vacPopup:false});};
  var inner=h("div",{className:"pinner"});
  inner.onclick=function(e){e.stopPropagation();};
  var phead=h("div",{className:"phead"});
  var ptitle=h("div",{className:"pday"},"📋 연간 휴가 리스트");
  var pclose=h("div",{className:"pclose"},"✕");
  pclose.onclick=function(){setState({vacPopup:false});};
  phead.appendChild(ptitle);phead.appendChild(pclose);
  inner.appendChild(phead);
  var allVac=VACATION_SCHEDULE.map(function(v){return Object.assign({},v,{isSeaworld:false});})
    .concat(SEAWORLD_SCHEDULE.map(function(v){return Object.assign({},v,{isSeaworld:true});}));
  allVac.sort(function(a,b){return a.start>b.start?1:a.start<b.start?-1:0;});
  allVac.forEach(function(v){
    var s=new Date(v.start+"T00:00:00"),e=new Date(v.end+"T00:00:00");
    var isActive=today>=s&&today<=e,isPast=today>e;
    var color=isActive?(v.isSeaworld?"#88eeff":"#ffd93d"):isPast?"#444":"#aaa";
    var row=document.createElement("div");
    row.style.cssText="display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #ffffff08";
    var nameEl=document.createElement("div");
    nameEl.style.cssText="min-width:80px;font-size:13px;font-weight:700;color:"+color;
    nameEl.textContent=v.name+(v.isSeaworld?" (씨월드)":"");
    if(isActive){var badge=document.createElement("span");badge.style.cssText="font-size:9px;background:"+(v.isSeaworld?"#88eeff33":"#ffd93d33")+";color:"+(v.isSeaworld?"#88eeff":"#ffd93d")+";border-radius:4px;padding:1px 5px;margin-left:6px";badge.textContent="휴가중";nameEl.appendChild(badge);}
    var dateEl=document.createElement("div");
    dateEl.style.cssText="font-size:11px;color:"+(isPast?"#444":"#888")+";margin-left:8px";
    dateEl.textContent=fmtVacDate(v.start)+" ~ "+fmtVacDate(v.end);
    row.appendChild(nameEl);row.appendChild(dateEl);inner.appendChild(row);
  });
  bg.appendChild(inner);return bg;
}

function renderSettings(){
  var s=state.settings;
  var bg=h("div",{className:"settings-bg"});
  bg.onclick=function(){setState({settingsOpen:false});};
  var inner=h("div",{className:"settings-inner"});
  inner.onclick=function(e){e.stopPropagation();};
  var head=h("div",{className:"settings-head"});
  head.appendChild(h("div",{className:"settings-title"},"⚙️ 설정"));
  var cls=h("div",{className:"settings-close"},"✕");
  cls.onclick=function(){setState({settingsOpen:false});};
  head.appendChild(cls);inner.appendChild(head);
  var sec1=h("div",{className:"settings-section"});
  sec1.appendChild(h("div",{className:"settings-label"},"▪ 폰트"));
  var opts1=h("div",{className:"settings-options"});
  [{v:"system",l:"시스템"},{v:"noto",l:"Noto Sans"},{v:"nanum",l:"나눔고딕"}].forEach(function(opt){
    var btn=h("div",{className:"settings-opt"+(s.font===opt.v?" active":"")},opt.l);
    btn.onclick=function(){setState({settings:Object.assign({},state.settings,{font:opt.v})});};
    opts1.appendChild(btn);
  });
  sec1.appendChild(opts1);inner.appendChild(sec1);
  var sec2=h("div",{className:"settings-section"});
  sec2.appendChild(h("div",{className:"settings-label"},"▪ 글씨 크기"));
  var sizeMap=[10,11,12,13,14,15,16];
  var sizeRow=h("div",{style:"display:flex;align-items:center;gap:12px"});
  var btnMinus=h("div",{className:"settings-opt",style:"font-size:18px;padding:6px 16px;font-weight:900"},"-");
  btnMinus.onclick=function(){setState({settings:Object.assign({},state.settings,{size:Math.max(0,state.settings.size-1)})});};
  var sizeVal=h("div",{style:"font-size:15px;font-weight:700;color:#fff;min-width:40px;text-align:center"},sizeMap[s.size]+"px");
  var btnPlus=h("div",{className:"settings-opt",style:"font-size:18px;padding:6px 16px;font-weight:900"},"+");
  btnPlus.onclick=function(){setState({settings:Object.assign({},state.settings,{size:Math.min(6,state.settings.size+1)})});};
  sizeRow.appendChild(btnMinus);sizeRow.appendChild(sizeVal);sizeRow.appendChild(btnPlus);
  sec2.appendChild(sizeRow);inner.appendChild(sec2);
  bg.appendChild(inner);return bg;
}

function selectMyName(name){var newName=state.myName===name?"":name;localStorage.setItem('myName',newName);setState({myName:newName});}
function selectFirstWorker(name){
  var isDesel=state.firstWorker===name;
  var newName=isDesel?"":name;
  if(!isDesel&&name){
    var today=new Date().toDateString();
    var hist=state.history.filter(function(h){return h.date!==today;});
    hist.unshift({date:today,name:name});
    if(hist.length>2)hist=hist.slice(0,2);
    localStorage.setItem('dayHistory',JSON.stringify(hist));
    localStorage.setItem('firstWorker',JSON.stringify({date:today,name:newName}));
    setState({firstWorker:newName,history:hist});
  } else {
    localStorage.setItem('firstWorker',JSON.stringify({date:new Date().toDateString(),name:newName}));
    setState({firstWorker:newName});
  }
}
function toggleCar(idx,val){
  var c=state.carDays.slice();c[idx]=c[idx]===val?null:val;
  localStorage.setItem('carPlan',JSON.stringify({date:new Date().toDateString(),days:c}));
  setState({carDays:c});
}
function toggleExcl(idx,name){
  var d=state.dayExcludes.map(function(e,i){
    if(i!==idx)return e;
    var u=Object.assign({},e);
    var cur=u[name];
    if(!cur)u[name]="결근";else if(cur==="결근")u[name]="휴가";else if(cur==="휴가")u[name]="씨월드";else delete u[name];
    return u;
  });
  localStorage.setItem('dayExcludes',JSON.stringify({date:new Date().toDateString(),data:d}));
  setState({dayExcludes:d});
}

render();
