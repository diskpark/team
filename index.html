function loadFromFirebase(callback){
  db.ref('schedule/'+TODAY).once('value').then(function(snap){
    var data = snap.val();
    if(data){
      // carDays
      if(data.carDays) localStorage.setItem('carPlan', JSON.stringify({date:new Date().toDateString(), days:data.carDays}));
      // firstWorker
      if(data.firstWorker) localStorage.setItem('firstWorker', JSON.stringify({date:new Date().toDateString(), name:data.firstWorker}));
      // dayExcludes
      if(data.dayExcludes) localStorage.setItem('dayExcludes', JSON.stringify({date:new Date().toDateString(), data:data.dayExcludes}));
    }
    if(callback) callback();
  }).catch(function(){ if(callback) callback(); });
}

// Firebase에 오늘 설정 저장 (팀장만)
function saveToFirebase(patch){
  db.ref('schedule/'+TODAY).update(patch);
}

}
var WORKERS=["이원훈","장형규","조현철","박진호","홍인석","하정남","황정호","김현진","전창범","오규종","김경훈","정철수","황인태","안찬범","김상원","이동현","김태민","김성환","김세영","홍원진","이재일","이준영","김태호","김택성","채관기","김재원","장병숙","윤광덕","박성기"];
var N=WORKERS.length;
var KR=["일","월","화","수","목","금","토"];
var VACATION_SCHEDULE=[

  {name:"이준영",  start:"2026-08-31",end:"2026-09-03"},
  {name:"채관기",  start:"2026-09-08",end:"2026-09-11"},
  {name:"장병숙",  start:"2026-09-30",end:"2026-10-03"},
  {name:"김경훈",  start:"2026-10-05",end:"2026-10-08"},

  {name:"박성기",  start:"2027-01-25",end:"2027-01-28"}
];

// 씨월드 인원 휴가 (땜빵 필요)
var SEAWORLD_SCHEDULE=[
  {name:"정태경", start:"2026-04-06",end:"2026-04-09"},
  {name:"박혁신", start:"2026-05-11",end:"2026-05-14"},
  {name:"김재일", start:"2026-06-16",end:"2026-06-19"},
  {name:"문환석", start:"2026-10-14",end:"2026-10-17"}
];
// 씨월드 고정 인원 (땜빵 제외 대상)
var SEAWORLD_MEMBERS=["정태경","박혁신","김재일","문환석"];

function getWeekDates(){
  var t=new Date(),r=[];
  for(var i=0;i<7;i++){var d=new Date(t);d.setDate(t.getDate()+i);r.push(pad(d.getMonth()+1)+"."+pad(d.getDate()));}
  return r;
}
function getWeekDays(){
  var t=new Date(),r=[];
  for(var i=0;i<7;i++){var d=new Date(t);d.setDate(t.getDate()+i);r.push(KR[d.getDay()]);}
  return r;
}
function getWeekDateObjs(){
  var t=new Date(),r=[];
  for(var i=0;i<7;i++){var d=new Date(t);d.setDate(t.getDate()+i);d.setHours(0,0,0,0);r.push(d);}
  return r;
}
function pad(n){return n<10?"0"+n:""+n;}
function fmtToday(){var t=new Date();return t.getFullYear()+"."+pad(t.getMonth()+1)+"."+pad(t.getDate());}
function fmtVacDate(s){var d=new Date(s+"T00:00:00");return(d.getMonth()+1)+"/"+d.getDate()+"("+KR[d.getDay()]+")";}
function toNum(name){return WORKERS.indexOf(name)+1;}

function getAutoVac(dateObjs){
  var r=[];
  for(var i=0;i<7;i++){r.push({});}
  dateObjs.forEach(function(cur,idx){
    VACATION_SCHEDULE.forEach(function(v){
      var s=new Date(v.start+"T00:00:00");
      var e=new Date(v.end+"T00:00:00");
      if(cur>=s&&cur<=e) r[idx][v.name]="휴가";
    });
  });
  return r;
}

function pickFwd(count,startIdx,excl){
  var team=[],cur=((startIdx%N)+N)%N;
  while(team.length<count){var name=WORKERS[cur];cur=(cur+1)%N;if(excl.indexOf(name)<0)team.push(name);}
  return {team:team,next:cur};
}
function pickRev(count,fromIdx,excl){
  var team=[],cur=((fromIdx%N)+N)%N;
  while(team.length<count){var name=WORKERS[cur];if(excl.indexOf(name)<0)team.push(name);cur=((cur-1)+N)%N;}
  return {team:team.reverse(),next:cur};
}
function insertOrder(arr,name){
  var idx=WORKERS.indexOf(name),ip=arr.length;
  for(var i=0;i<arr.length;i++){if(WORKERS.indexOf(arr[i])>idx){ip=i;break;}}
  arr.splice(ip,0,name);
}

function calcSchedule(carDays,dayExcl,firstWorker,sundayCount,weekDays){
  var fi=WORKERS.indexOf(firstWorker);
  var initBib=pickRev(6,(fi-1+N)%N,[]).team;
  var cursor=fi,prevDae=initBib,prevSun=[],prevYac=[],prevActBib=initBib;
  var result=[];
  for(var d=0;d<carDays.length;d++){
    var hasCar=carDays[d],prevCar=d>0?carDays[d-1]:null;
    var exclMap=dayExcl[d]||{},excl=Object.keys(exclMap);
    var avail=WORKERS.filter(function(w){return excl.indexOf(w)<0;});
    var bib=pickRev(6,WORKERS.indexOf(prevDae[prevDae.length-1]),excl).team;
    var prevExclMap=d>0?(dayExcl[d-1]||{}):{};
    var absRet=Object.keys(prevExclMap).filter(function(w){return prevExclMap[w]==="결근"&&excl.indexOf(w)<0;});
    var vacRet=Object.keys(prevExclMap).filter(function(w){return prevExclMap[w]==="휴가"&&excl.indexOf(w)<0;});
    if(hasCar){
      var dae,sun,yac,jay;
      if(d===0||!prevCar){
        var r1=pickFwd(6,cursor,excl);dae=r1.team;
        var r2=pickFwd(4,r1.next,excl);sun=r2.team;
        var r3=pickFwd(6,r2.next,excl);yac=r3.team;
        var r4=pickFwd(4,r3.next,excl);jay=r4.team;
        cursor=r4.next;
      } else {
        dae=prevSun.concat(prevYac.slice(0,2)).filter(function(w){return excl.indexOf(w)<0;});
        sun=prevYac.slice(2,6).filter(function(w){return excl.indexOf(w)<0;});
        var pj=result[d-1].jay.filter(function(w){return excl.indexOf(w)<0;});
        var r1=pickFwd(6-pj.length,cursor,excl);yac=pj.concat(r1.team);cursor=r1.next;
        var r2=pickFwd(4,cursor,excl);jay=r2.team;cursor=r2.next;
      }
      absRet.forEach(function(ret){if(dae.indexOf(ret)>=0)dae=dae.filter(function(w){return w!==ret;});});
      vacRet.forEach(function(ret){
        insertOrder(yac,ret);
        if(yac.length>6){var pushed=yac.splice(6,1)[0];insertOrder(jay,pushed);if(jay.length>4)jay.splice(4,1);}
      });
      var assigned=dae.concat(sun,yac,jay,bib);
      var jad=avail.filter(function(w){return assigned.indexOf(w)<0;});
      result.push({hasCar:true,dae:dae,sun:sun,yac:yac,jay:jay,jad:jad,bib:bib,rest:[],excl:exclMap});
      prevDae=dae;prevSun=sun;prevYac=yac;prevActBib=bib;
    } else {
      if(sundayCount>0&&weekDays&&weekDays[d]==="일"){
        // 일요근무도 차없음 연속 규칙: 전날 대양1번 앞번호 기준
        var li;
        if(prevCar===false){
          li=(WORKERS.indexOf(prevDae[0])-1+N)%N;
        } else {
          li=WORKERS.indexOf(prevActBib[prevActBib.length-1]);
        }
        var sw=pickRev(sundayCount,li,excl).team;
        var rest=avail.filter(function(w){return sw.indexOf(w)<0&&bib.indexOf(w)<0;});
        result.push({hasCar:false,dae:[],sun:[],yac:[],jay:[],jad:sw,bib:bib,rest:rest,excl:exclMap,isSun:true,swTeam:sw});
        // 차 있음 다음날 비번: 근무자 + 부족하면 다음순번으로 6명 채우기
        var bibForNext=sw.slice();
        if(bibForNext.length>6){
          // 말번 탈락 → 대양1번
          cursor=WORKERS.indexOf(bibForNext[bibForNext.length-1]);
          bibForNext=bibForNext.slice(0,6);
        } else if(bibForNext.length<6){
          // 부족분 다음순번으로 채우기
          var lastIdx=WORKERS.indexOf(bibForNext[bibForNext.length-1]);
          var need=6-bibForNext.length;
          var cur=(lastIdx+1)%N;
          for(var ni=0;ni<need;ni++){
            while(excl.indexOf(WORKERS[cur])>=0) cur=(cur+1)%N;
            bibForNext.push(WORKERS[cur]);
            cur=(cur+1)%N;
          }
          cursor=cur;
        } else {
          cursor=WORKERS.indexOf(bibForNext[bibForNext.length-1])+1;
        }
        prevDae=bibForNext;
        // 차 없음 다음날: 일요일에 쉰 사람들 말번부터 역순
        var restAll=WORKERS.filter(function(w){return sw.indexOf(w)<0&&excl.indexOf(w)<0;});
        prevActBib=restAll;
        prevSun=[];prevYac=[];
      } else {
        // 차없음: 당일 대양1번 앞번호가 비번 말번
        // 전날이 차있음이면 prevActBib 말번 사용
        // 전날도 차없음이면 전날 대양1번 앞번호 사용
        var li;
        if(prevCar===false){
          // 연속 차없음: 전날 대양 첫번째 앞번호
          li=(WORKERS.indexOf(prevDae[0])-1+N)%N;
        } else {
          // 차있음 다음 차없음: 전날 비번 말번
          li=WORKERS.indexOf(prevActBib[prevActBib.length-1]);
        }
        var rJ=pickRev(4,li,excl),rS=pickRev(4,rJ.next,excl),rD=pickRev(6,rS.next,excl);
        var jay=rJ.team,sun=rS.team,dae=rD.team;
        var assigned=dae.concat(sun,jay,bib);
        var rest=avail.filter(function(w){return assigned.indexOf(w)<0;});
        result.push({hasCar:false,dae:dae,sun:sun,yac:[],jay:jay,jad:[],bib:bib,rest:rest,excl:exclMap});
        prevDae=dae;prevSun=sun;prevYac=[];prevActBib=bib;
        if(d<carDays.length-1&&carDays[d+1])cursor=(WORKERS.indexOf(dae[dae.length-1])+1)%N;
      }
    }
  }
  return result;
}

function h(tag,attrs,children){
  var el=document.createElement(tag);
  if(attrs)for(var k in attrs){
    if(k==="className")el.className=attrs[k];
    else if(k.startsWith("on"))el[k.toLowerCase()]=attrs[k];
    else el.setAttribute(k,attrs[k]);
  }
  if(children){
    if(typeof children==="string")el.innerHTML=children;
    else if(Array.isArray(children))children.forEach(function(c){if(c)el.appendChild(typeof c==="string"?document.createTextNode(c):c);});
    else el.appendChild(children);
  }
  return el;
}

    function formatNames(label, names){
      if(!names||names.length===0) return "";
      // 라벨을 4글자 기준으로 맞추기
      var labels={"대양":"대양","성우":"성우","오선":"오선","C":"  C","휴가":"휴가","결근":"결근","차":"  차","일요근무":"일요근무"};
      var lb=(labels[label]||label)+", ";
      // 두번째 줄 들여쓰기: lb 길이만큼
      var pad="";
      for(var p=0;p<lb.length;p++) pad+=" ";
      var line="";
      for(var i=0;i<names.length;i+=4){
        var chunk=names.slice(i,i+4);
        if(i===0) line+=lb+chunk.join(", ")+"\n";
        else line+=pad+chunk.join(", ")+"\n";
      }
      return line;

      var absNames=Object.keys(tomorrowMerged).filter(function(k){return tomorrowMerged[k]==="결근";});
      // 씨월드: merged 기준
      var swNames=Object.keys(tomorrowMerged).filter(function(k){return tomorrowMerged[k]==="씨월드";});
      if(tomorrow.hasCar){
        line+=formatNames("대양",tomorrow.dae);
        line+=formatNames("성우",tomorrow.sun);
        line+=formatNames("차",tomorrow.yac);
        line+=formatNames("오선",tomorrow.jay);
        line+=formatNames("차",tomorrow.jad);

      var todayText=wd[0].replace(".","/").replace(/^0/,"")+" "+wk[0]+" (오늘)\n";
      if(todayDay.hasCar){
        if(todayDay.dae&&todayDay.dae.length>0) todayText+="대양, "+todayDay.dae.join(", ")+"\n";
        if(todayDay.sun&&todayDay.sun.length>0) todayText+="성우, "+todayDay.sun.join(", ")+"\n";
        if(todayDay.yac&&todayDay.yac.length>0) todayText+="차, "+todayDay.yac.join(", ")+"\n";
        if(todayDay.jay&&todayDay.jay.length>0) todayText+="오선, "+todayDay.jay.join(", ")+"\n";
        if(todayDay.jad&&todayDay.jad.length>0) todayText+="차, "+todayDay.jad.join(", ")+"\n";
      } else {
        if(todayDay.dae&&todayDay.dae.length>0) todayText+="대양, "+todayDay.dae.join(", ")+"\n";
        if(todayDay.sun&&todayDay.sun.length>0) todayText+="성우, "+todayDay.sun.join(", ")+"\n";
        if(todayDay.jay&&todayDay.jay.length>0) todayText+="오선, "+todayDay.jay.join(", ")+"\n";
      }
      if(todaySw.length>0) todayText+="씨월드, "+todaySw.join(", ")+"\n";
      if(todayVac.length>0) todayText+="휴가, "+todayVac.join(", ")+"\n";
      if(todayAbs.length>0) todayText+="결근, "+todayAbs.join(", ")+"\n";

      var todayLabel=h("div",{style:"font-size:10px;color:#666;font-weight:700;letter-spacing:2px;margin-bottom:6px"},"▪ 오늘 근무");
      var todayPre=h("div",{style:"background:#0d0d1a;border-radius:10px;padding:12px;font-size:12px;line-height:1.9;color:#888;white-space:pre-wrap;word-break:break-all;margin-bottom:14px"},todayText.trim());
      pinner.appendChild(todayLabel);
      pinner.appendChild(todayPre);

      // 내일 텍스트 표시
      var tomorrowLabel=h("div",{style:"font-size:10px;color:#4a9eff88;font-weight:700;letter-spacing:2px;margin-bottom:6px"},"▪ 내일 근무 (카톡 발송용)");
      var pre=h("div",{style:"background:#0d0d1a;border-radius:10px;padding:14px;font-size:13px;line-height:2;color:#e0e0f0;white-space:pre-wrap;word-break:break-all;margin-bottom:16px"},text);
      pinner.appendChild(tomorrowLabel);
      pinner.appendChild(pre);
      // 복사 버튼
      var cbtn=h("div",{style:"background:#4a9eff;color:#fff;font-size:14px;font-weight:700;border-radius:12px;padding:12px;text-align:center;cursor:pointer"},"📋 복사하기");
      cbtn.onclick=function(){
        if(navigator.clipboard){
          navigator.clipboard.writeText(text).then(function(){
            cbtn.textContent="✅ 복사됨!";
            setTimeout(function(){document.body.removeChild(pbg);},1000);
          });
        } else {
          var ta=document.createElement("textarea");
          ta.value=text;document.body.appendChild(ta);ta.select();
          document.execCommand("copy");document.body.removeChild(ta);
          cbtn.textContent="✅ 복사됨!";
          setTimeout(function(){document.body.removeChild(pbg);},1000);
        }
      };
      pinner.appendChild(cbtn);
      pbg.appendChild(pinner);
      document.body.appendChild(pbg);
    };

    // 복사 버튼
    var copyBtn=h("div",{style:"font-size:11px;color:#4a9eff;font-weight:700;cursor:pointer;padding:4px 10px;border:1px solid #4a9eff44;border-radius:8px;background:#4a9eff11"},"📋 내일 복사");
    copyBtn.onclick=function(){
      var line=makeTomorrowText();
      if(navigator.clipboard){
        navigator.clipboard.writeText(line).then(function(){
          copyBtn.textContent="✅ 복사됨!";
          setTimeout(function(){copyBtn.textContent="📋 내일 복사";},2000);
        });
      } else {
        var ta=document.createElement("textarea");
        ta.value=line;document.body.appendChild(ta);ta.select();
        document.execCommand("copy");document.body.removeChild(ta);
        copyBtn.textContent="✅ 복사됨!";
        setTimeout(function(){copyBtn.textContent="📋 내일 복사";},2000);
      }
    };
    var btnRow=h("div",{style:"display:flex;gap:6px"});
    btnRow.appendChild(previewBtn);
    btnRow.appendChild(copyBtn);
    swHead.appendChild(btnRow);
  }
  wrap.appendChild(swHead);
  var tw=h("div",{className:"tw"});
  var tbl=document.createElement("table");

  // thead
  var thead=document.createElement("thead");
  var tr=document.createElement("tr");
  tr.appendChild(h("th",{className:"site-th"},"현장"));
  wk.forEach(function(day,idx){
    var isWe=day==="토"||day==="일";
    var th=document.createElement("th");
    var exC=Object.keys(merged[idx]).length;
    var inner="<div style='color:"+(isWe?"#ff6b6b":"#aaa")+";font-weight:900;font-size:13px'>"+day+"</div>";
    inner+="<div style='color:#444;font-size:9px'>"+wd[idx]+"</div>";
    inner+="<div style='font-size:9px;font-weight:700;color:"+(cd[idx]?"#4a9eff":"#ff6b6b")+"'>"+(cd[idx]?"차O":"차X")+"</div>";
    if(exC>0)inner+="<div style='font-size:9px;color:#ff9f7f;font-weight:700'>제외"+exC+"</div>";
    th.innerHTML=inner;
    tr.appendChild(th);
  });
  thead.appendChild(tr);
  tbl.appendChild(thead);

  // tbody
  var tbody=document.createElement("tbody");
  SITES.forEach(function(site){
    var row=document.createElement("tr");
    var tdl=h("td",{className:"site-td",style:"color:"+site.color},site.label);
    row.appendChild(tdl);
    sched.forEach(function(day,idx){
      var bg=idx%2===0?"#0f0f1a":"#111120";
      var td=document.createElement("td");
      td.style.background=bg;
      td.style.borderTop="1px solid #ffffff08";

      if(site.key==="excl"){
        var entries=Object.entries(day.excl||{});
        if(entries.length===0){td.innerHTML="<span style='color:#2a2a3a'>-</span>";}
        else{
          var html="";
          entries.forEach(function(pair){
            var t=pair[1];
            html+="<span style='display:block;font-size:10px;line-height:1.8;color:"+(t==="결근"?"#ff6b6b":"#ffd93d")+";font-weight:700'>"+toNum(pair[0])+(t==="결근"?"결":"휴")+"</span>";
          });
          td.innerHTML=html;
        }
        row.appendChild(td);return;
      }

      if(day.isSun){
        if(site.key==="sunw"){
          var m=day.jad||[];
          td.style.color="#ffd93d";
          td.innerHTML=m.map(toNum).join(" ")||"-";
        } else if(site.key==="jad"){
          td.innerHTML="<span style='color:#2a2a3a'>-</span>";
        } else if(site.key==="rest"){
          var m=day.rest||[];
          td.style.color="#888";
          td.innerHTML=m.length>0?m.map(toNum).join(" "):"-";
        } else if(site.key==="bib"){
          var m=day.bib||[];
          td.style.color="#cccc55";
          td.innerHTML=m.length>0?m.map(toNum).join(" "):"-";
        } else {
          td.innerHTML="<span style='color:#2a2a3a'>-</span>";
        }
        row.appendChild(td);return;
      }

      var isEmpty=(site.key==="yac"&&!day.hasCar)||(site.key==="rest"&&day.hasCar)||(site.key==="jad"&&!day.hasCar)||(site.key==="sunw"&&!day.isSun);
      var members=day[site.key]||[];
      if(isEmpty||members.length===0){
        td.innerHTML="<span style='color:#2a2a3a'>-</span>";
      } else {
        td.style.color=site.color;
        var html="";
        members.forEach(function(n){
          var num=toNum(n);
          if(state.myName&&n===state.myName) html+="<span class='hl'>"+num+"</span> ";
          else html+=num+" ";
        });
        td.innerHTML=html.trim();
      }
      row.appendChild(td);
    });
    tbody.appendChild(row);
  });
  tbl.appendChild(tbody);
  tw.appendChild(tbl);
  wrap.appendChild(tw);

  // 번호 참고
  var ref=h("div",{className:"ref-wrap"});
  ref.appendChild(h("div",{className:"ref-title"},"▪ 번호 참고"));
  var rg=h("div",{className:"ref-grid"});
  WORKERS.forEach(function(name,i){
    var item=document.createElement("div");
    item.className="ref-item";
    item.innerHTML="<span class='ref-num'>"+(i+1)+"</span> "+name;
    rg.appendChild(item);
  });
  ref.appendChild(rg);
  wrap.appendChild(ref);
  return wrap;
}

function renderMySchedule(sched,wk,wd){
  var name=state.myName;
  var card=h("div",{className:"my-card"});
  card.appendChild(h("div",{className:"my-title"},"▪ "+name+" · 내 주간 근무"));
  var rows=h("div",{className:"my-row"});
  var LABELS={dae:"대양",sun:"성우",yac:"야차",jay:"제이",jad:"자동차",rest:"비번",bib:"비번"};
  var COLORS={dae:"#4a9eff",sun:"#6effb4",yac:"#ffd93d",jay:"#ff9f7f",jad:"#88cc88",rest:"#888",bib:"#cccc55"};
  sched.forEach(function(day,idx){
    var site="",color="#aaa",pos=0;
    if(day.isSun){
      if((day.jad||[]).indexOf(name)>=0){pos=(day.jad||[]).indexOf(name)+1;site="일요근무("+pos+"번)";color="#ffd93d";}
      else if((day.bib||[]).indexOf(name)>=0){site="비번";color="#cccc55";}
      else if((day.rest||[]).indexOf(name)>=0){site="비번";color="#888";}
      else site="미배정";
    } else {
      var NOPOS=["jad","rest","bib"];
      var keys=["dae","sun","yac","jay","jad","bib","rest"];
      for(var ki=0;ki<keys.length;ki++){
        var k=keys[ki];
        var arr=day[k]||[];
        if(arr.indexOf(name)>=0){
          pos=arr.indexOf(name)+1;
          site=NOPOS.indexOf(k)>=0?LABELS[k]:LABELS[k]+"("+pos+"번)";
          color=COLORS[k];break;
        }
      }
      if(!site)site="미배정";
    }
    var isWe=wk[idx]==="토"||wk[idx]==="일";
    var item=h("div",{className:"my-item"});
    var dayEl=h("div",{className:"my-day",style:"color:"+(isWe?"#ff6b6b":"#aaa")});
    dayEl.innerHTML=wk[idx]+"<br><span style='font-size:9px;color:#444'>"+wd[idx]+"</span>";
    item.appendChild(dayEl);
    item.appendChild(h("div",{className:"my-site",style:"color:"+color},site));
    rows.appendChild(item);
  });
  card.appendChild(rows);
  return card;
}

function renderPopup(idx,wk,wd,merged,dayExcl){
  var bg=h("div",{className:"pbg"});
  bg.onclick=function(){setState({popupDay:null});};
  var inner=h("div",{className:"pinner"});
  inner.onclick=function(e){e.stopPropagation();};
  var phead=h("div",{className:"phead"});
  var ptitle=document.createElement("div");
  ptitle.innerHTML="<span class='pday'>"+wk[idx]+"요일</span><span class='pdate'>"+wd[idx]+"</span>";
  var pclose=h("div",{className:"pclose"},"✕");
  pclose.onclick=function(){setState({popupDay:null});};
  phead.appendChild(ptitle);phead.appendChild(pclose);
  inner.appendChild(phead);
  inner.appendChild(h("div",{className:"phint"},"▪ 제외 인원 (탭: 없음→결근→휴가→씨월드→없음)"));
  var grid=h("div",{className:"grid3"});
  WORKERS.forEach(function(name){
    var manual=(dayExcl[idx]||{})[name];
    var isAuto=!manual&&!!(merged[idx]||{})[name];
    var btnCls="eb"+(manual==="결근"?" absent":manual==="휴가"?" vacation":manual==="씨월드"?" seaworld":isAuto?" autovac":"");
    var nameCls="en"+(manual==="결근"?" absent":manual==="휴가"?" vacation":manual==="씨월드"?" seaworld":isAuto?" autovac":"");
    var typeCls="et "+(manual==="결근"?"absent":manual==="씨월드"?"seaworld":"vacation");
    var showType=manual||(isAuto?"휴가(자동)":"");
    var btn=h("div",{className:btnCls});
    btn.appendChild(h("div",{className:nameCls},name));
    if(showType){btn.appendChild(h("div",{className:typeCls},showType));}
    btn.onclick=function(){
      btn.classList.remove("popping");
      void btn.offsetWidth;
      btn.classList.add("popping");
      toggleExcl(idx,name);
    };
    grid.appendChild(btn);
  });
  inner.appendChild(grid);
  bg.appendChild(inner);
  return bg;
}

function renderVacPopup(){
  var today=new Date();today.setHours(0,0,0,0);
  var bg=h("div",{className:"pbg"});
  bg.onclick=function(){setState({vacPopup:false});};
  var inner=h("div",{className:"pinner"});
  inner.onclick=function(e){e.stopPropagation();};
  var phead=h("div",{className:"phead"});
  var ptitle=h("div",{className:"pday"},"📋 연간 휴가 리스트");
  var pclose=h("div",{className:"pclose"},"✕");
  pclose.onclick=function(){setState({vacPopup:false});};
  phead.appendChild(ptitle);phead.appendChild(pclose);
  inner.appendChild(phead);
  // 전체 합산 후 날짜순 정렬
  var allVac=VACATION_SCHEDULE.map(function(v){return Object.assign({},v,{isSeaworld:false});})
    .concat(SEAWORLD_SCHEDULE.map(function(v){return Object.assign({},v,{isSeaworld:true});}));
  allVac.sort(function(a,b){return a.start>b.start?1:a.start<b.start?-1:0;});
  allVac.forEach(function(v){
    var s=new Date(v.start+"T00:00:00"),e=new Date(v.end+"T00:00:00");
    var isActive=today>=s&&today<=e,isPast=today>e;
    var color=isActive?(v.isSeaworld?"#88eeff":"#ffd93d"):isPast?"#444":"#aaa";
    var row=document.createElement("div");
    row.style.cssText="display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #ffffff08";
    var nameEl=document.createElement("div");
    nameEl.style.cssText="min-width:80px;font-size:13px;font-weight:700;color:"+color;
    nameEl.textContent=v.name+(v.isSeaworld?" (씨월드)":"");
    if(isActive){
      var badge=document.createElement("span");
      badge.style.cssText="font-size:9px;background:"+(v.isSeaworld?"#88eeff33":"#ffd93d33")+";color:"+(v.isSeaworld?"#88eeff":"#ffd93d")+";border-radius:4px;padding:1px 5px;margin-left:6px";
      badge.textContent="휴가중";
      nameEl.appendChild(badge);
    }
    var dateEl=document.createElement("div");
    dateEl.style.cssText="font-size:11px;color:"+(isPast?"#444":"#888")+";margin-left:8px";
    dateEl.textContent=fmtVacDate(v.start)+" ~ "+fmtVacDate(v.end);
    row.appendChild(nameEl);row.appendChild(dateEl);
    inner.appendChild(row);
  });
  bg.appendChild(inner);
  return bg;
}

function selectMyName(name){
  var newName=state.myName===name?"":name;
  localStorage.setItem('myName',newName);
  setState({myName:newName});
}
function selectFirstWorker(name){
  var isDesel=state.firstWorker===name;
  var newName=isDesel?"":name;
  if(!isDesel&&name){
    // history에 오늘 날짜+이름 저장 (최근 2개만)
    var today=new Date().toDateString();
    var hist=state.history.filter(function(h){return h.date!==today;});
    hist.unshift({date:today,name:name});
    if(hist.length>2)hist=hist.slice(0,2);
    localStorage.setItem('dayHistory',JSON.stringify(hist));
    localStorage.setItem('firstWorker',JSON.stringify({date:new Date().toDateString(),name:newName}));
    saveToFirebase({firstWorker:newName});
    setState({firstWorker:newName,history:hist});
  } else {
    localStorage.setItem('firstWorker',JSON.stringify({date:new Date().toDateString(),name:newName}));
    saveToFirebase({firstWorker:newName});
    setState({firstWorker:newName});
  }
}
function renderSettings(){
  var s=state.settings;
  var bg=h("div",{className:"settings-bg"});
  bg.onclick=function(){setState({settingsOpen:false});};
  var inner=h("div",{className:"settings-inner"});
  inner.onclick=function(e){e.stopPropagation();};
  var head=h("div",{className:"settings-head"});
  head.appendChild(h("div",{className:"settings-title"},"⚙️ 설정"));
  var cls=h("div",{className:"settings-close"},"✕");
  cls.onclick=function(){setState({settingsOpen:false});};
  head.appendChild(cls);
  inner.appendChild(head);

  // 폰트
  var sec1=h("div",{className:"settings-section"});
  sec1.appendChild(h("div",{className:"settings-label"},"▪ 폰트"));
  var opts1=h("div",{className:"settings-options"});
  [{v:"noto",l:"Noto Sans"},{v:"system",l:"시스템"},{v:"nanum",l:"나눔고딕"}].forEach(function(opt){
    var btn=h("div",{className:"settings-opt"+(s.font===opt.v?" active":"")},opt.l);
    btn.onclick=function(){var ns=Object.assign({},state.settings,{font:opt.v});setState({settings:ns});};
    opts1.appendChild(btn);
  });
  sec1.appendChild(opts1);
  inner.appendChild(sec1);

  // 글씨 크기
  var sec2=h("div",{className:"settings-section"});
  sec2.appendChild(h("div",{className:"settings-label"},"▪ 글씨 크기"));
  var sizeRow=h("div",{style:"display:flex;align-items:center;gap:12px"});
  var sizeMap=[10,11,12,13,14,15,16];
  var btnMinus=h("div",{className:"settings-opt",style:"font-size:18px;padding:6px 16px;font-weight:900"},"-");
  btnMinus.onclick=function(){var ns=Object.assign({},state.settings,{size:Math.max(0,state.settings.size-1)});setState({settings:ns});};
  var sizeVal=h("div",{style:"font-size:15px;font-weight:700;color:#fff;min-width:40px;text-align:center"},sizeMap[s.size]+"px");
  var btnPlus=h("div",{className:"settings-opt",style:"font-size:18px;padding:6px 16px;font-weight:900"},"+" );
  btnPlus.onclick=function(){var ns=Object.assign({},state.settings,{size:Math.min(6,state.settings.size+1)});setState({settings:ns});};
  sizeRow.appendChild(btnMinus);
  sizeRow.appendChild(sizeVal);
  sizeRow.appendChild(btnPlus);
  sec2.appendChild(sizeRow);
  inner.appendChild(sec2);

  // 스킨
  var sec3=h("div",{className:"settings-section"});
  sec3.appendChild(h("div",{className:"settings-label"},"▪ 스킨"));
  var opts3=h("div",{className:"settings-options"});
  [{v:"dark",l:"🌌 다크"},{v:"navy",l:"🌊 네이비"},{v:"black",l:"⬛ 블랙"}].forEach(function(opt){
    var btn=h("div",{className:"settings-opt"+(s.skin===opt.v?" active":"")},opt.l);
    btn.onclick=function(){var ns=Object.assign({},state.settings,{skin:opt.v});setState({settings:ns});};
    opts3.appendChild(btn);
  });
  sec3.appendChild(opts3);
  inner.appendChild(sec3);

  bg.appendChild(inner);
  return bg;
}

function toggleCar(idx,val){
  var c=state.carDays.slice();
  c[idx]=c[idx]===val?null:val;
  localStorage.setItem('carPlan',JSON.stringify({date:new Date().toDateString(),days:c}));
  saveToFirebase({carDays:c});
  setState({carDays:c});
}
function toggleExcl(idx,name){
  var d=state.dayExcludes.map(function(e,i){
    if(i!==idx)return e;
    var u=Object.assign({},e);
    var cur=u[name];
    if(!cur)u[name]="결근";
    else if(cur==="결근")u[name]="휴가";
    else if(cur==="휴가")u[name]="씨월드";
    else delete u[name];
    return u;
  });
  localStorage.setItem('dayExcludes',JSON.stringify({date:new Date().toDateString(),data:d}));
  saveToFirebase({dayExcludes:d});
  setState({dayExcludes:d});
}

render();
